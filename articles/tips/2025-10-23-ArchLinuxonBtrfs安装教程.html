            <h1 class="article-title">Arch Linux on Btrfs 安装教程</h1>

            <script type="application/json" id="article-markdown">
"\u4e00\u4efd**\u8be6\u7ec6\u3001\u5b8c\u6574\u3001\u5e76\u91c7\u7528 Btrfs \u6587\u4ef6\u7cfb\u7edf**\u7684 Arch Linux \u5b89\u88c5\u6559\u7a0b\u3002\n\n\u672c\u6559\u7a0b\u878d\u5408\u4e86\u4ee5\u4e0b\u6240\u6709\u5b9a\u5236\u9700\u6c42\uff1a\n\n  * **\u6587\u4ef6\u7cfb\u7edf\uff1a** Btrfs\uff0c\u7528\u4e8e\u5feb\u7167\u548c\u56de\u6eda\u3002\n  * **\u5206\u533a/\u5b50\u5377\uff1a** 1G `/boot` (ESP, `nvme0n1p1`), Btrfs \u9876\u7ea7\u5377 (`nvme0n1p2`), \u5305\u542b `@`, `@home`, `@swap`, `@log`, `@cache` \u5b50\u5377\u3002\n  * **Swap\uff1a** 64G Swapfile\u3002\n  * **\u5f15\u5bfc\u7a0b\u5e8f\uff1a** `systemd-boot`\u3002\n  * **\u57fa\u7840\u73af\u5883\uff1a** \u6781\u7b80\u547d\u4ee4\u884c\uff0c\u65e0\u684c\u9762\u73af\u5883\u3002\n  * **\u672c\u5730\u5316\uff1a** \u4e2d\u6587\u8bed\u8a00\u5305\uff0c\u7cfb\u7edf\u73af\u5883\u663e\u793a\u82f1\u6587 (`LANG=en_US.UTF-8`)\uff0cFcitx5 \u8f93\u5165\u6cd5\u6846\u67b6\u3002\n  * **\u4e3b\u673a\u540d/\u7528\u6237\uff1a** `dev` / `syaofox`\u3002\n  * **\u5f00\u53d1/\u9a71\u52a8\uff1a** `base-devel`, `git`, `nvidia-open` \u9a71\u52a8\u3002\n  * **\u8f6f\u4ef6\u5305\u7ba1\u7406\uff1a** AUR \u52a9\u624b `paru`\uff0c\u5feb\u7167\u5de5\u5177 `snapper`\u3002\n\n-----\n\n# \ud83d\ude80 Arch Linux Btrfs \u5f00\u53d1\u8005\u5b9a\u5236\u5b8c\u6574\u5b89\u88c5\u6559\u7a0b\n\n## \u9636\u6bb5\u4e00\uff1a\u9884\u5b89\u88c5\u51c6\u5907 (Pre-installation)\n\n### 1\\. \u5f15\u5bfc\u3001\u7f51\u7edc\u4e0e\u65f6\u95f4\u540c\u6b65\n\n1.  \u4e0b\u8f7d Arch Linux ISO \u6587\u4ef6\u5e76\u5199\u5165 USB \u9a71\u52a8\u5668\u3002\n2.  \u901a\u8fc7 **UEFI** \u6a21\u5f0f\u542f\u52a8\u7535\u8111\uff0c\u8fdb\u5165 Arch Linux Live \u73af\u5883\u3002\n3.  **\u68c0\u67e5\u7f51\u7edc\u8fde\u901a\u6027\uff1a**\n      * **\u6709\u7ebf\uff1a** \u68c0\u67e5 `ip a`\u3002\n      * **\u65e0\u7ebf\uff1a** \u8fd0\u884c `iwctl`\uff0c\u7136\u540e\u4f7f\u7528 `station wlan0 scan/get-networks/connect \"Your-Wifi-SSID\"` \u8fde\u63a5\u3002\n      * \u6d4b\u8bd5\uff1a`ping archlinux.org`\n4.  **\u540c\u6b65\u7cfb\u7edf\u65f6\u95f4\uff1a**\n    ```bash\n    timedatectl set-ntp true\n    ```\n\n### 2\\. \u786c\u76d8\u5206\u533a (Partition the disk)\n\n\u4e3b\u786c\u76d8\uff1a`/dev/nvme0n1`\u3002\n\n```bash\nfdisk /dev/nvme0n1\n```\n\n1.  **\u521b\u5efa `/boot` (ESP) \u5206\u533a (`nvme0n1p1`)\uff1a**\n      * `n` (New) -\\\u003e \u5206\u533a\u53f7 `1` -\\\u003e \u8d77\u59cb\u6247\u533a\u9ed8\u8ba4 -\\\u003e \u5927\u5c0f `+1G`\u3002\n      * `t` (Type) -\\\u003e \u7c7b\u578b\u7801 `1` (EFI System)\u3002\n2.  **\u521b\u5efa Btrfs \u6839\u5206\u533a (`nvme0n1p2`)\uff1a**\n      * `n` (New) -\\\u003e \u5206\u533a\u53f7 `2` -\\\u003e \u8d77\u59cb\u6247\u533a\u9ed8\u8ba4 -\\\u003e \u5927\u5c0f\u9ed8\u8ba4\uff08\u4f7f\u7528\u5269\u4f59\u5168\u90e8\uff09\u3002\n      * `t` (Type) -\\\u003e \u7c7b\u578b\u7801 `20` (Linux filesystem)\u3002\n3.  **\u4fdd\u5b58\u5e76\u9000\u51fa\uff1a** `w`\u3002\n\n### 3\\. \u683c\u5f0f\u5316\u5206\u533a (Formatting)\n\n```bash\n# \u683c\u5f0f\u5316 /boot (ESP) \u5206\u533a\u4e3a FAT32\nmkfs.fat -F 32 /dev/nvme0n1p1\n\n# \u683c\u5f0f\u5316 Btrfs \u6839\u5206\u533a\nmkfs.btrfs -f /dev/nvme0n1p2\n```\n\n### 4\\. \u6302\u8f7d\u9876\u7ea7\u5377\u5e76\u521b\u5efa\u5b50\u5377\n\n\u9996\u5148\uff0c\u6302\u8f7d Btrfs \u9876\u7ea7\u5377\uff0c\u7136\u540e\u521b\u5efa\u60a8\u6240\u9700\u7684\u5b50\u5377\u7ed3\u6784\u3002\n\n```bash\n# \u6302\u8f7d Btrfs \u9876\u7ea7\u5377 (subvolid=5)\nmount /dev/nvme0n1p2 /mnt\n\n# \u521b\u5efa\u5b50\u5377 (Subvolumes)\nbtrfs subvolume create /mnt/@        # \u6839\u76ee\u5f55\nbtrfs subvolume create /mnt/@home    # \u5bb6\u76ee\u5f55\nbtrfs subvolume create /mnt/@swap    # \u7528\u4e8e\u5b58\u653e swapfile (\u7981\u7528 CoW)\nbtrfs subvolume create /mnt/@log     # /var/log\nbtrfs subvolume create /mnt/@cache   # /var/cache\n\n# \u5378\u8f7d\u9876\u7ea7\u5377\uff0c\u51c6\u5907\u91cd\u65b0\u6302\u8f7d\numount /mnt\n```\n\n### 5\\. \u91cd\u65b0\u6302\u8f7d\u5b50\u5377\u5230\u6700\u7ec8\u6302\u8f7d\u70b9\n\n\u91cd\u65b0\u6302\u8f7d\u65f6\uff0c\u5e94\u7528 Btrfs \u4f18\u5316\u9009\u9879 (`compress=zstd`, `noatime`)\u3002\n\n```bash\n# \u6302\u8f7d @ \u5b50\u5377\u4f5c\u4e3a\u6839\u76ee\u5f55 /\nmount -o subvol=@,compress=zstd,noatime /dev/nvme0n1p2 /mnt\n\n# \u521b\u5efa\u5176\u4f59\u5b50\u5377\u7684\u6302\u8f7d\u70b9\nmkdir -p /mnt/{home,var/log,var/cache,swap,boot}\n\n# \u6302\u8f7d\u5176\u4ed6\u5b50\u5377\nmount -o subvol=@home,compress=zstd,noatime /dev/nvme0n1p2 /mnt/home\nmount -o subvol=@log,compress=zstd,noatime /dev/nvme0n1p2 /mnt/var/log\nmount -o subvol=@cache,compress=zstd,noatime /dev/nvme0n1p2 /mnt/var/cache\nmount -o subvol=@swap /dev/nvme0n1p2 /mnt/swap # @swap \u5b50\u5377\u4e0d\u5e94\u542f\u7528\u538b\u7f29\n\n# \u6302\u8f7d /boot (ESP \u5206\u533a)\nmount /dev/nvme0n1p1 /mnt/boot\n```\n\n### 6\\. \u521b\u5efa 64GB Swapfile\n\n**\u7981\u7528 `/mnt/swap` \u5b50\u5377\u7684\u5199\u65f6\u590d\u5236 (CoW) \u662f\u521b\u5efa Swapfile \u7684\u5fc5\u9700\u6b65\u9aa4\uff01**\n\n```bash\n# \u7981\u7528 /mnt/swap \u76ee\u5f55\u7684 CoW\nchattr +C /mnt/swap\n\n# \u521b\u5efa 64G swapfile\nfallocate -l 64G /mnt/swap/swapfile\n\n# \u8bbe\u7f6e\u6743\u9650\u5e76\u683c\u5f0f\u5316\nchmod 600 /mnt/swap/swapfile\nmkswap /mnt/swap/swapfile\n```\n\n## \u9636\u6bb5\u4e8c\uff1a\u7cfb\u7edf\u5b89\u88c5\u4e0e Chroot\n\n### 7\\. \u5b89\u88c5\u57fa\u672c\u7cfb\u7edf\u3001\u5f00\u53d1\u5305\u548c\u5b9a\u5236\u5305\n\n\u5b89\u88c5\u60a8\u6240\u6709\u8981\u6c42\u7684\u8f6f\u4ef6\u5305\u3002\n\n```bash\n# 1. \u57fa\u7840\u7cfb\u7edf\npacstrap /mnt base linux linux-firmware systemd vim \n\n# 2. Btrfs \u548c\u5f00\u53d1\u5de5\u5177\npacstrap /mnt btrfs-progs base-devel git \n\n# 3. NVIDIA Open \u9a71\u52a8\u548c\u5de5\u5177\npacstrap /mnt nvidia-open nvidia-settings nvidia-utils\n\n# 4. \u8f93\u5165\u6cd5\u6846\u67b6\npacstrap /mnt fcitx5 fcitx5-chinese-addons\n```\n\n### 8\\. \u751f\u6210 fstab \u6587\u4ef6\n\n```bash\ngenfstab -U /mnt \u003e\u003e /mnt/etc/fstab\n```\n\n**\u91cd\u8981\uff1a\u624b\u52a8\u7f16\u8f91 `/mnt/etc/fstab` \u68c0\u67e5\u5e76\u6dfb\u52a0 Swapfile \u914d\u7f6e**\n\n```bash\nnano /mnt/etc/fstab\n```\n\n  * **\u68c0\u67e5\uff1a** Btrfs \u6302\u8f7d\u9009\u9879\u662f\u5426\u6b63\u786e\uff0c\u7279\u522b\u662f `@swap` \u5b50\u5377\u662f\u5426\u6302\u8f7d\u3002\n  * **\u6dfb\u52a0 Swapfile \u914d\u7f6e\uff1a**\n    ```\n    /swap/swapfile none swap defaults 0 0\n    ```\n\n\u4fdd\u5b58\u5e76\u9000\u51fa\u3002\n\n### 9\\. \u8fdb\u5165\u65b0\u7cfb\u7edf\u73af\u5883 (Chroot)\n\n```bash\narch-chroot /mnt\n```\n\n## \u9636\u6bb5\u4e09\uff1a\u7cfb\u7edf\u914d\u7f6e\u4e0e\u5f15\u5bfc\n\n### 10\\. \u65f6\u533a\u4e0e\u672c\u5730\u5316\n\n1.  **\u8bbe\u7f6e\u65f6\u533a\uff1a**\n    ```bash\n    ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime \n    hwclock --systohc\n    ```\n2.  **\u672c\u5730\u5316 (\u4e2d\u6587\u5305\uff0c\u82f1\u6587\u73af\u5883)\uff1a**\n      * \u7f16\u8f91 `/etc/locale.gen`\uff0c\u53d6\u6d88 `en_US.UTF-8 UTF-8` \u548c `zh_CN.UTF-8 UTF-8` \u7684\u6ce8\u91ca\u3002\n      * `locale-gen`\u3002\n      * \u8bbe\u7f6e\u7cfb\u7edf\u73af\u5883\u4e3a\u82f1\u6587\uff1a`echo \"LANG=en_US.UTF-8\" \u003e /etc/locale.conf`\u3002\n\n### 11\\. \u4e3b\u673a\u540d\u548c\u7f51\u7edc\n\n1.  **\u8bbe\u7f6e\u4e3b\u673a\u540d (`dev`)\uff1a**\n    ```bash\n    echo \"dev\" \u003e /etc/hostname \n    ```\n2.  **\u7f16\u8f91 `/etc/hosts` \u6587\u4ef6\uff1a**\n    ```bash\n    nano /etc/hosts\n    # \u6dfb\u52a0\uff1a127.0.1.1\tdev.localdomain\tdev\n    ```\n3.  **\u542f\u7528\u7f51\u7edc\u7ba1\u7406\u670d\u52a1\uff1a**\n    ```bash\n    pacman -S networkmanager \n    systemctl enable NetworkManager\n    ```\n\n### 12\\. Root \u5bc6\u7801\u548c\u7528\u6237 (`syaofox`)\n\n1.  **\u8bbe\u7f6e root \u5bc6\u7801**\uff1a`passwd`\u3002\n2.  **\u521b\u5efa\u7528\u6237 `syaofox`**\uff1a\n    ```bash\n    useradd -m -g users -G wheel syaofox\n    passwd syaofox\n    ```\n3.  **\u914d\u7f6e `sudo`**\uff1a\n      * `visudo`\uff0c\u53d6\u6d88 `%wheel ALL=(ALL:ALL) ALL` \u7684\u6ce8\u91ca\u3002\n\n### 13\\. \u914d\u7f6e NVIDIA Open \u9a71\u52a8\u52a0\u8f7d\n\n1.  **\u7f16\u8f91 `/etc/mkinitcpio.conf`\uff1a**\n    ```bash\n    nano /etc/mkinitcpio.conf\n    ```\n    \u5728 `MODULES` \u6570\u7ec4\u4e2d\u6dfb\u52a0 NVIDIA \u6a21\u5757\uff1a\n    ```\n    MODULES=(nvidia nvidia_modeset nvidia_uvm nvidia_drm)\n    ```\n2.  **\u91cd\u65b0\u751f\u6210 initramfs \u955c\u50cf\uff1a**\n    ```bash\n    mkinitcpio -P\n    ```\n\n### 14\\. \u5b89\u88c5\u548c\u914d\u7f6e\u5f15\u5bfc\u7a0b\u5e8f - systemd-boot\n\n1.  **\u5b89\u88c5 bootctl\uff1a**\n    ```bash\n    bootctl install\n    ```\n2.  **\u5b89\u88c5 CPU \u5fae\u7801\uff1a**\n    ```bash\n    pacman -S intel-ucode # \u6216 amd-ucode\n    mkinitcpio -P # \u518d\u6b21\u751f\u6210 initramfs\n    ```\n3.  **\u521b\u5efa\u5f15\u5bfc\u6761\u76ee `/boot/loader/entries/arch.conf`\uff1a**\n      * \u83b7\u53d6 Btrfs \u6839\u5206\u533a UUID\uff1a`blkid /dev/nvme0n1p2` (\u8bb0\u4e0b UUID)\u3002\n      * \u521b\u5efa\u6587\u4ef6\uff1a\n        ```bash\n        nano /boot/loader/entries/arch.conf\n        ```\n        **\u6ce8\u610f\uff1a** Btrfs \u5f15\u5bfc\u65f6\u9700\u8981\u6307\u5b9a `rootflags=subvol=@` \u6765\u6302\u8f7d\u6839\u76ee\u5f55\u5b50\u5377\u3002\n        ```\n        title   Arch Linux\n        linux   /vmlinuz-linux\n        initrd  /intel-ucode.img \n        initrd  /initramfs-linux.img\n        options root=UUID=YOUR_ROOT_UUID rw rootflags=subvol=@\n        ```\n4.  **\u914d\u7f6e loader.conf\uff1a**\n    ```bash\n    nano /boot/loader/loader.conf\n    # \u786e\u4fdd\u9ed8\u8ba4\u8bbe\u7f6e\u5982\u4e0b\uff1a\n    # default arch\n    # timeout 4\n    # editor no\n    ```\n\n## \u9636\u6bb5\u56db\uff1a\u6536\u5c3e\u548c\u9996\u6b21\u542f\u52a8\n\n### 15\\. \u5b8c\u6210\u5e76\u91cd\u542f\n\n1.  **\u9000\u51fa chroot \u73af\u5883\uff1a**\n    ```bash\n    exit\n    ```\n2.  **\u5378\u8f7d\u6240\u6709\u5df2\u6302\u8f7d\u5206\u533a\uff1a**\n    ```bash\n    umount -R /mnt\n    ```\n3.  **\u91cd\u542f\u7cfb\u7edf\uff1a**\n    ```bash\n    reboot\n    ```\n    **\u26a0 \u62d4\u6389 USB \u542f\u52a8\u76d8\uff01**\n\n## \u9636\u6bb5\u4e94\uff1a\u9996\u6b21\u542f\u52a8\u540e\u7684\u914d\u7f6e\n\n\u7cfb\u7edf\u91cd\u542f\u540e\uff0c\u4ee5\u7528\u6237\u540d `syaofox` \u767b\u5f55\u3002\n\n### 16\\. \u5b89\u88c5 Paru AUR \u52a9\u624b\n\n```bash\n# \u5207\u6362\u5230\u7528\u6237\u5bb6\u76ee\u5f55\ncd ~\n\n# 1. \u514b\u9686 paru \u4ed3\u5e93\ngit clone https://aur.archlinux.org/paru.git\ncd paru\n\n# 2. \u7f16\u8bd1\u5e76\u5b89\u88c5 paru\nmakepkg -si\n\n# 3. \u6e05\u7406\ncd ..\nrm -rf paru\n```\n\n### 17\\. \u5b89\u88c5 Snapper \u548c\u81ea\u52a8\u5feb\u7167\u5de5\u5177\n\n\u4f7f\u7528 `paru` \u5b89\u88c5 Btrfs \u5feb\u7167\u548c\u81ea\u52a8\u5feb\u7167\u5de5\u5177\u3002\n\n```bash\nparu -S snapper snap-pac grub-btrfs \n# snap-pac \u8d1f\u8d23\u5728 pacman/paru \u64cd\u4f5c\u524d\u540e\u81ea\u52a8\u521b\u5efa\u5feb\u7167\u3002\n```\n\n### 18\\. \u914d\u7f6e Snapper \u5feb\u7167\n\n\u4e3a\u9700\u8981\u5feb\u7167\u7684\u5b50\u5377\u521b\u5efa\u914d\u7f6e\u3002\n\n1.  **\u521b\u5efa\u6839\u76ee\u5f55 (@) \u914d\u7f6e\uff1a**\n    ```bash\n    sudo snapper create-config -f root @\n    ```\n2.  **\u521b\u5efa\u5bb6\u76ee\u5f55 (@home) \u914d\u7f6e\uff1a**\n    ```bash\n    sudo snapper create-config -f home @home\n    ```\n3.  **\u542f\u7528 Snapper \u81ea\u52a8\u6e05\u7406\u670d\u52a1\uff1a**\n    ```bash\n    sudo systemctl enable --now snapper-timeline.timer\n    sudo systemctl enable --now snapper-cleanup.timer\n    ```\n\n### 19\\. \u5b89\u88c5 Brave \u6d4f\u89c8\u5668\n\n```bash\nparu -S brave-bin\n```\n\n### 20\\. Fcitx5 \u73af\u5883\u53d8\u91cf\u914d\u7f6e (\u547d\u4ee4\u884c\u73af\u5883\u63d0\u793a)\n\nFcitx5 \u9700\u8981\u56fe\u5f62\u73af\u5883\u624d\u80fd\u5de5\u4f5c\u3002\u5728 `syaofox` \u7528\u6237\u7684 shell \u914d\u7f6e\u6587\u4ef6\u4e2d\u8bbe\u7f6e\u4ee5\u4e0b\u73af\u5883\u53d8\u91cf\uff0c\u4ee5\u4fbf\u5728\u60a8\u542f\u52a8\u4efb\u4f55\u56fe\u5f62\u7a0b\u5e8f\u65f6\u8f93\u5165\u6cd5\u80fd\u6b63\u5e38\u5de5\u4f5c\u3002\n\n```bash\n# \u7f16\u8f91\u7528\u6237\u7684 bash \u914d\u7f6e\u6587\u4ef6\nnano ~/.bashrc\n\n# \u5728\u6587\u4ef6\u672b\u5c3e\u6dfb\u52a0\u4ee5\u4e0b\u5185\u5bb9\uff1a\nexport GTK_IM_MODULE=fcitx\nexport QT_IM_MODULE=fcitx\nexport XMODIFIERS=@im=fcitx\nexport SDL_IM_MODULE=fcitx\n\n# \u7acb\u5373\u751f\u6548\nsource ~/.bashrc\n```\n\n\u81f3\u6b64\uff0c\u60a8\u7684 Arch Linux Btrfs \u5f00\u53d1\u8005\u5b9a\u5236\u73af\u5883\u5df2\u914d\u7f6e\u5b8c\u6210\u3002"
            </script>

    <!-- 滚动悬浮按钮 -->
    <div class="scroll-buttons">
        <button class="scroll-btn" id="scroll-to-top" title="回到顶部">↑</button>
        <button class="scroll-btn" id="scroll-to-bottom" title="滚到底部">↓</button>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 页面加载完成后，延迟移除 page-loading 类，启用过渡动画
            setTimeout(function() {
                document.documentElement.classList.remove('page-loading');
            }, 50);
            
            // 为所有代码块添加复制按钮
            const codeBlocks = document.querySelectorAll('pre > code');
            
            codeBlocks.forEach(function(codeBlock) {
                // 跳过已经包装的代码块
                if (codeBlock.parentElement.classList.contains('code-block-wrapper')) {
                    return;
                }
                
                const pre = codeBlock.parentElement;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                
                // 创建复制按钮
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '复制';
                
                // 包装pre元素
                pre.parentElement.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);
                wrapper.appendChild(copyBtn);
                
                // 添加复制功能
                copyBtn.addEventListener('click', function() {
                    const text = codeBlock.textContent;
                    
                    // 使用现代Clipboard API
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(text).then(function() {
                            showCopied(copyBtn);
                        }).catch(function() {
                            // 降级到传统方法
                            fallbackCopy(text, copyBtn);
                        });
                    } else {
                        // 降级到传统方法
                        fallbackCopy(text, copyBtn);
                    }
                });
            });
            
            function showCopied(btn) {
                btn.textContent = '已复制';
                btn.classList.add('copied');
                
                setTimeout(function() {
                    btn.textContent = '复制';
                    btn.classList.remove('copied');
                }, 1500);
            }
            
            function fallbackCopy(text, btn) {
                // 创建临时文本区域
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                textArea.style.top = '-999999px';
                document.body.appendChild(textArea);
                
                try {
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    showCopied(btn);
                } catch (err) {
                    console.error('复制失败:', err);
                    btn.textContent = '复制失败';
                    setTimeout(function() {
                        btn.textContent = '复制';
                    }, 1500);
                } finally {
                    document.body.removeChild(textArea);
                }
            }
            
            // 滚动悬浮按钮功能
            const scrollToTopBtn = document.getElementById('scroll-to-top');
            const scrollToBottomBtn = document.getElementById('scroll-to-bottom');
            
            function updateScrollButtons() {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const windowHeight = window.innerHeight;
                const documentHeight = document.documentElement.scrollHeight;
                
                // 显示/隐藏回到顶部按钮
                if (scrollTop > 300) {
                    scrollToTopBtn.classList.add('visible');
                } else {
                    scrollToTopBtn.classList.remove('visible');
                }
                
                // 显示/隐藏滚到底部按钮
                if (scrollTop + windowHeight < documentHeight - 300) {
                    scrollToBottomBtn.classList.add('visible');
                } else {
                    scrollToBottomBtn.classList.remove('visible');
                }
            }
            
            // 监听滚动事件
            window.addEventListener('scroll', updateScrollButtons);
            
            // 回到顶部按钮点击事件
            scrollToTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
            
            // 滚到底部按钮点击事件
            scrollToBottomBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: document.documentElement.scrollHeight,
                    behavior: 'smooth'
                });
            });
            
            // 初始化时检查按钮状态
            updateScrollButtons();
            
            // 主题切换功能
            const themeToggle = document.getElementById('theme-toggle');
            const body = document.body;
            
            // 更新词云图片
            function updateWordcloudImage(isDark) {
                const wordcloudImg = document.getElementById('wordcloud-img');
                if (wordcloudImg) {
                    const newSrc = isDark ? 'assets/wordcloud-dark.png' : 'assets/wordcloud-light.png';
                    if (wordcloudImg.src !== new URL(newSrc, window.location.href).href) {
                        wordcloudImg.src = newSrc;
                        console.log('词云图片已切换至:', newSrc);
                    }
                } else {
                    console.warn('未找到词云图片元素');
                }
            }
            
            // 初始化主题（同步 body 类和其他主题相关元素）
            function initTheme() {
                const isDark = document.documentElement.classList.contains('dark-mode');
                
                // 同步 body 的 dark-mode 类
                if (isDark) {
                    body.classList.add('dark-mode');
                } else {
                    body.classList.remove('dark-mode');
                }
                
                // 初始化代码高亮主题
                const lightTheme = document.getElementById('highlight-theme-light');
                const darkTheme = document.getElementById('highlight-theme-dark');
                if (isDark) {
                    if (lightTheme) lightTheme.disabled = true;
                    if (darkTheme) darkTheme.disabled = false;
                } else {
                    if (lightTheme) lightTheme.disabled = false;
                    if (darkTheme) darkTheme.disabled = true;
                }
                
                updateWordcloudImage(isDark);
            }
            
            // 切换主题
            function toggleTheme() {
                const isDarkMode = document.documentElement.classList.contains('dark-mode');
                const lightTheme = document.getElementById('highlight-theme-light');
                const darkTheme = document.getElementById('highlight-theme-dark');
                
                if (isDarkMode) {
                    // 切换到亮色模式
                    document.documentElement.classList.remove('dark-mode');
                    body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                    updateWordcloudImage(false);
                    // 切换代码高亮主题
                    if (lightTheme) lightTheme.disabled = false;
                    if (darkTheme) darkTheme.disabled = true;
                } else {
                    // 切换到暗色模式
                    document.documentElement.classList.add('dark-mode');
                    body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                    updateWordcloudImage(true);
                    // 切换代码高亮主题
                    if (lightTheme) lightTheme.disabled = true;
                    if (darkTheme) darkTheme.disabled = false;
                }
            }
            
            // 监听主题切换按钮点击
            themeToggle.addEventListener('click', toggleTheme);
            
            // 立即初始化主题，避免闪烁
            initTheme();
            
            // 目录导航功能
            function initTocNavigation() {
                const tocItems = document.querySelectorAll('.toc-item a');
                if (tocItems.length === 0) return;
                
                // 移动端目录折叠功能
                function initMobileTocToggle() {
                    const tocSidebar = document.querySelector('.toc-sidebar');
                    const tocTitle = document.querySelector('.toc-title');
                    
                    if (!tocSidebar || !tocTitle) return;
                    
                    // 检查是否为移动端
                    function isMobile() {
                        return window.innerWidth <= 1023;
                    }
                    
                    // 初始化移动端状态
                    function initMobileState() {
                        if (isMobile()) {
                            tocSidebar.classList.remove('expanded');
                        } else {
                            tocSidebar.classList.add('expanded');
                        }
                    }
                    
                    // 切换折叠状态
                    function toggleToc() {
                        if (!isMobile()) return;
                        
                        tocSidebar.classList.toggle('expanded');
                    }
                    
                    // 监听标题点击
                    tocTitle.addEventListener('click', function(e) {
                        if (isMobile()) {
                            e.preventDefault();
                            toggleToc();
                        }
                    });
                    
                    // 监听窗口大小变化
                    window.addEventListener('resize', function() {
                        initMobileState();
                    });
                    
                    // 初始化状态
                    initMobileState();
                }
                
                // 初始化移动端折叠功能
                initMobileTocToggle();
                
                // 为目录链接添加平滑滚动
                tocItems.forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('href').substring(1);
                        const targetElement = document.getElementById(targetId);
                        
                        if (targetElement) {
                            targetElement.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start'
                            });
                        }
                    });
                });
                
                // 监听滚动，高亮当前章节
                function updateActiveTocItem() {
                    const headings = document.querySelectorAll('h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]');
                    const scrollTop = window.pageYOffset;
                    const windowHeight = window.innerHeight;
                    
                    let currentHeading = null;
                    
                    headings.forEach(heading => {
                        const headingTop = heading.offsetTop - 100; // 偏移量，提前激活
                        
                        if (scrollTop >= headingTop) {
                            currentHeading = heading;
                        }
                    });
                    
                    // 更新目录项激活状态
                    tocItems.forEach(link => {
                        link.parentElement.classList.remove('active');
                    });
                    
                    if (currentHeading) {
                        const activeLink = document.querySelector(`.toc-item a[href="#${currentHeading.id}"]`);
                        if (activeLink) {
                            activeLink.parentElement.classList.add('active');
                        }
                    }
                }
                
                // 节流滚动监听
                let ticking = false;
                window.addEventListener('scroll', function() {
                    if (!ticking) {
                        requestAnimationFrame(function() {
                            updateActiveTocItem();
                            ticking = false;
                        });
                        ticking = true;
                    }
                });
                
                // 初始调用
                updateActiveTocItem();
            }
            
            // 初始化目录导航
            initTocNavigation();
        });
    </script>
