            <h1 class="article-title">Arch Linux 安装教程</h1>
            <div class="article-meta">

            <!-- 原始 Markdown 存储（JSON 格式避免转义问题） -->
            <script type="application/json" id="article-markdown">
"\n  * **\u4e3b\u673a\u540d\uff1a** `dev`\n  * **\u7528\u6237\u540d\uff1a** `syaofox`\n  * **\u5206\u533a\uff1a** 1G `/boot` (ESP, `nvme0n1p1`), \u6839\u76ee\u5f55 (`nvme0n1p2`), 64G swapfile\u3002\n  * **\u73af\u5883\uff1a** \u6781\u7b80\u547d\u4ee4\u884c\u73af\u5883\uff0c\u65e0\u684c\u9762\u3002\n  * **\u8f6f\u4ef6\u5305\uff1a** `git`, `base-devel`, `nvidia-open` \u9a71\u52a8, `fcitx5`, `paru`, `brave-bin` (\u6700\u540e\u901a\u8fc7 `paru` \u5b89\u88c5)\u3002\n  * **\u672c\u5730\u5316\uff1a** \u4e2d\u6587\u8bed\u8a00\u5305\uff0c\u7cfb\u7edf\u73af\u5883\u663e\u793a\u82f1\u6587\u3002\n\n-----\n\n# \ud83d\ude80 Arch Linux \u5b8c\u6574\u5b89\u88c5\u6559\u7a0b (\u5f00\u53d1\u8005\u5b9a\u5236\u7248)\n\n## \u9636\u6bb5\u4e00\uff1a\u9884\u5b89\u88c5\u51c6\u5907 (Pre-installation)\n\n### 1\\. \u5f15\u5bfc\u5b89\u88c5\u4ecb\u8d28\u4e0e\u6821\u9a8c\n\n1.  \u4e0b\u8f7d Arch Linux ISO \u6587\u4ef6\u5e76\u6821\u9a8c PGP \u7b7e\u540d\u3002\n2.  \u4f7f\u7528 `dd` \u6216 Etcher \u7b49\u5de5\u5177\u5c06 ISO \u5199\u5165 USB \u9a71\u52a8\u5668\u3002\n3.  \u901a\u8fc7 **UEFI** \u6a21\u5f0f\u542f\u52a8\u7535\u8111\uff0c\u8fdb\u5165 Arch Linux Live \u73af\u5883\u3002\n\n### 2\\. \u68c0\u67e5\u7f51\u7edc\u8fde\u63a5\n\n**\u6709\u7ebf\u8fde\u63a5**\u901a\u5e38\u4f1a\u81ea\u52a8\u8fde\u63a5\u3002\n\n**\u65e0\u7ebf\u8fde\u63a5 (Wi-Fi)\uff1a**\n\n```bash\n# \u8fd0\u884c\u4ea4\u4e92\u5f0f\u5de5\u5177\niwctl \n\n# \u67e5\u770b\u8bbe\u5907\ndevice list \n\n# \u626b\u63cf\u5e76\u8fde\u63a5\u7f51\u7edc (\u5047\u8bbe Wi-Fi \u8bbe\u5907\u540d\u4e3a wlan0)\nstation wlan0 scan \nstation wlan0 get-networks \nstation wlan0 connect \"Your-Wifi-SSID\" \n\n# \u9000\u51fa iwctl\nexit \n```\n\n**\u68c0\u67e5\u7f51\u7edc\u8fde\u901a\u6027\uff1a**\n\n```bash\nping archlinux.org -c 3\n```\n\n### 3\\. \u66f4\u65b0\u7cfb\u7edf\u65f6\u95f4\n\n```bash\ntimedatectl set-ntp true\n```\n\n### 4\\. \u786c\u76d8\u5206\u533a (Partition the disk)\n\n\u60a8\u7684\u4e3b\u786c\u76d8\u662f NVMe \u56fa\u6001\u786c\u76d8 `/dev/nvme0n1`\u3002\n\n```bash\nfdisk /dev/nvme0n1\n```\n\n1.  **\u521b\u5efa `/boot` (ESP) \u5206\u533a\uff1a**\n      * \u8f93\u5165 `n` (\u521b\u5efa\u65b0\u5206\u533a)\u3002\n      * \u5206\u533a\u53f7 `1`\u3002\n      * \u8d77\u59cb\u6247\u533a\uff1a\u9ed8\u8ba4\u3002\n      * \u5927\u5c0f\uff1a\u8f93\u5165 `+1G`\u3002\n      * \u8f93\u5165 `t` (\u6539\u53d8\u5206\u533a\u7c7b\u578b)\u3002\n      * \u7c7b\u578b\u7801\uff1a\u8f93\u5165 `1` \u6216 `L`\uff0c\u9009\u62e9 `EFI System`\u3002\n2.  **\u521b\u5efa\u6839\u76ee\u5f55 `/` \u5206\u533a\uff1a**\n      * \u8f93\u5165 `n` (\u521b\u5efa\u65b0\u5206\u533a)\u3002\n      * \u5206\u533a\u53f7 `2`\u3002\n      * \u8d77\u59cb\u6247\u533a\uff1a\u9ed8\u8ba4\u3002\n      * \u5927\u5c0f\uff1a\u9ed8\u8ba4\uff08\u4f7f\u7528\u6240\u6709\u5269\u4f59\u7a7a\u95f4\uff09\u3002\n      * \u7c7b\u578b\u7801\uff1a\u8f93\u5165 `20` \u6216 `L`\uff0c\u9009\u62e9 `Linux filesystem`\u3002\n3.  **\u4fdd\u5b58\u5e76\u9000\u51fa\uff1a**\n      * \u8f93\u5165 `w`\u3002\n\n### 5\\. \u683c\u5f0f\u5316\u5206\u533a\n\n```bash\n# \u683c\u5f0f\u5316 /boot (ESP) \u5206\u533a\u4e3a FAT32\nmkfs.fat -F 32 /dev/nvme0n1p1\n\n# \u683c\u5f0f\u5316\u6839\u76ee\u5f55 / \u5206\u533a\u4e3a Ext4\nmkfs.ext4 /dev/nvme0n1p2\n```\n\n### 6\\. \u6302\u8f7d\u6587\u4ef6\u7cfb\u7edf\u5e76\u521b\u5efa Swapfile\n\n```bash\n# \u6302\u8f7d\u6839\u76ee\u5f55\nmount /dev/nvme0n1p2 /mnt \n\n# \u521b\u5efa /boot \u6302\u8f7d\u70b9\u5e76\u6302\u8f7d ESP\nmkdir /mnt/boot\nmount /dev/nvme0n1p1 /mnt/boot\n\n# \u521b\u5efa 64G swapfile\nfallocate -l 64G /mnt/swapfile\nchmod 600 /mnt/swapfile\nmkswap /mnt/swapfile\n```\n\n## \u9636\u6bb5\u4e8c\uff1a\u7cfb\u7edf\u5b89\u88c5\u4e0e Chroot\n\n### 7\\. \u5b89\u88c5\u57fa\u672c\u7cfb\u7edf\u3001\u5f00\u53d1\u5305\u548c\u5b9a\u5236\u5305\n\n\u5b89\u88c5\u57fa\u7840\u5305\u3001\u5185\u6838\u3001\u56fa\u4ef6\uff0c\u4ee5\u53ca\u60a8\u8981\u6c42\u7684\u5f00\u53d1\u5de5\u5177\u548c NVIDIA \u9a71\u52a8\u3002\n\n```bash\n# \u5b89\u88c5\u57fa\u7840\u7cfb\u7edf\u3001\u5185\u6838\u3001\u56fa\u4ef6\u3001SystemD \u548c\u6587\u672c\u7f16\u8f91\u5668\npacstrap /mnt base linux linux-firmware systemd vim \n\n# \u5b89\u88c5\u6838\u5fc3\u7f16\u8bd1/\u5f00\u53d1\u5de5\u5177\u5305 (base-devel) \u548c git\npacstrap /mnt base-devel git \n\n# \u5b89\u88c5 NVIDIA Open \u9a71\u52a8\u548c\u5de5\u5177\npacstrap /mnt nvidia-open nvidia-settings nvidia-utils\n\n# \u5b89\u88c5\u8f93\u5165\u6cd5\u6846\u67b6\npacstrap /mnt fcitx5 fcitx5-chinese-addons\n```\n\n### 8\\. \u751f\u6210 fstab \u6587\u4ef6\n\n\u751f\u6210\u6587\u4ef6\u7cfb\u7edf\u8868\uff0c\u786e\u4fdd\u7cfb\u7edf\u80fd\u8bc6\u522b\u5206\u533a\u548c **Swapfile**\u3002\n\n```bash\ngenfstab -U /mnt \u003e\u003e /mnt/etc/fstab\n```\n\n**\u91cd\u8981\uff1a\u624b\u52a8\u7f16\u8f91 `/mnt/etc/fstab` \u6dfb\u52a0 Swapfile \u914d\u7f6e**\n\n```bash\nnano /mnt/etc/fstab\n```\n\n\u5728\u6587\u4ef6\u672b\u5c3e\u6dfb\u52a0\u4e00\u884c\uff0c\u7528\u4e8e\u6fc0\u6d3b Swapfile\uff1a\n\n```\n/swapfile none swap defaults 0 0\n```\n\n\u4fdd\u5b58\u5e76\u9000\u51fa\u3002\n\n### 9\\. \u8fdb\u5165\u65b0\u7cfb\u7edf\u73af\u5883 (Chroot)\n\n```bash\narch-chroot /mnt\n```\n\n## \u9636\u6bb5\u4e09\uff1a\u7cfb\u7edf\u57fa\u672c\u914d\u7f6e (Configure the system)\n\n### 10\\. \u65f6\u533a\u3001\u672c\u5730\u5316\u8bbe\u7f6e\n\n1.  **\u8bbe\u7f6e\u65f6\u533a\uff1a**\n    ```bash\n    ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime \n    hwclock --systohc\n    ```\n2.  **\u672c\u5730\u5316 (\u4e2d\u6587\u5305\uff0c\u82f1\u6587\u73af\u5883)\uff1a**\n      * \u7f16\u8f91 `/etc/locale.gen`\uff0c\u53d6\u6d88\u4ee5\u4e0b\u4e24\u884c\u6ce8\u91ca\uff1a\n        ```bash\n        nano /etc/locale.gen\n        # \u53d6\u6d88\u6ce8\u91ca\uff1a\n        #en_US.UTF-8 UTF-8\n        #zh_CN.UTF-8 UTF-8\n        ```\n      * \u751f\u6210 locales\uff1a\n        ```bash\n        locale-gen\n        ```\n      * \u8bbe\u7f6e\u7cfb\u7edf\u73af\u5883\u4e3a\u82f1\u6587\uff1a\n        ```bash\n        echo \"LANG=en_US.UTF-8\" \u003e /etc/locale.conf\n        ```\n\n### 11\\. \u4e3b\u673a\u540d\u548c\u7f51\u7edc\u7ba1\u7406\n\n1.  **\u8bbe\u7f6e\u4e3b\u673a\u540d (`dev`)\uff1a**\n    ```bash\n    echo \"dev\" \u003e /etc/hostname \n    ```\n2.  **\u7f16\u8f91 `/etc/hosts` \u6587\u4ef6\uff1a**\n    ```bash\n    nano /etc/hosts\n    # \u6dfb\u52a0\u4ee5\u4e0b\u5185\u5bb9\uff1a\n    # 127.0.0.1\tlocalhost\n    # ::1\t\tlocalhost\n    # 127.0.1.1\tdev.localdomain\tdev\n    ```\n3.  **\u542f\u7528\u7f51\u7edc\u7ba1\u7406\u670d\u52a1\uff1a**\n    ```bash\n    pacman -S networkmanager # \u5982\u679c\u672a\u968f base-devel \u5b89\u88c5\n    systemctl enable NetworkManager\n    ```\n\n### 11\\. Root \u5bc6\u7801\u548c\u7528\u6237 (`syaofox`)\n\n1.  **\u8bbe\u7f6e root \u5bc6\u7801\uff1a**\n    ```bash\n    passwd\n    ```\n2.  **\u521b\u5efa\u7528\u6237 `syaofox` \u5e76\u8bbe\u7f6e\u5bc6\u7801\uff1a**\n    ```bash\n    useradd -m -g users -G wheel syaofox\n    passwd syaofox\n    ```\n3.  **\u914d\u7f6e `sudo`\uff1a**\n      * \u8fd0\u884c `visudo`\u3002\n      * \u53d6\u6d88 `%wheel ALL=(ALL:ALL) ALL` \u7684\u6ce8\u91ca\uff0c\u5141\u8bb8 `wheel` \u7ec4\u7528\u6237\u4f7f\u7528 `sudo`\u3002\n\n### 12\\. \u914d\u7f6e NVIDIA Open \u9a71\u52a8\u52a0\u8f7d\n\n\u8fd9\u662f\u786e\u4fdd NVIDIA \u9a71\u52a8\u6b63\u5e38\u5de5\u4f5c\u7684\u5173\u952e\u6b65\u9aa4\u3002\n\n1.  **\u7f16\u8f91 `/etc/mkinitcpio.conf`\uff1a**\n    ```bash\n    nano /etc/mkinitcpio.conf\n    ```\n    \u5728 `MODULES` \u6570\u7ec4\u4e2d\u6dfb\u52a0 NVIDIA \u6a21\u5757\uff1a\n    ```\n    MODULES=(nvidia nvidia_modeset nvidia_uvm nvidia_drm)\n    ```\n2.  **\u91cd\u65b0\u751f\u6210 initramfs \u955c\u50cf\uff1a**\n    ```bash\n    mkinitcpio -P\n    ```\n\n### 13\\. \u5b89\u88c5\u548c\u914d\u7f6e\u5f15\u5bfc\u7a0b\u5e8f - systemd-boot\n\n1.  **\u5b89\u88c5 bootctl\uff1a**\n    ```bash\n    bootctl install\n    ```\n2.  **\u5b89\u88c5 CPU \u5fae\u7801\uff1a** (\u5982\u679c\u9002\u7528)\n    ```bash\n    pacman -S intel-ucode # \u6216 amd-ucode\n    mkinitcpio -P # \u518d\u6b21\u751f\u6210 initramfs \u4ee5\u5305\u542b\u5fae\u7801\n    ```\n3.  **\u521b\u5efa\u5f15\u5bfc\u6761\u76ee `/boot/loader/entries/arch.conf`\uff1a**\n      * \u83b7\u53d6\u6839\u5206\u533a UUID\uff1a`blkid /dev/nvme0n1p2` (\u8bb0\u4e0b UUID)\u3002\n      * \u521b\u5efa\u6587\u4ef6\uff1a\n        ```bash\n        nano /boot/loader/entries/arch.conf\n        ```\n        \u586b\u5165\u4ee5\u4e0b\u5185\u5bb9\uff08\u66ff\u6362 `YOUR_ROOT_UUID`\uff09\uff1a\n        ```\n        title   Arch Linux\n        linux   /vmlinuz-linux\n        initrd  /intel-ucode.img # \u6839\u636e\u60a8\u7684 CPU \u66ff\u6362\u4e3a amd-ucode.img\n        initrd  /initramfs-linux.img\n        options root=UUID=YOUR_ROOT_UUID rw\n        ```\n4.  **\u914d\u7f6e loader.conf\uff1a**\n    ```bash\n    nano /boot/loader/loader.conf\n    # \u786e\u4fdd\u9ed8\u8ba4\u8bbe\u7f6e\u5982\u4e0b\uff1a\n    # default arch\n    # timeout 4\n    # editor no\n    ```\n\n## \u9636\u6bb5\u56db\uff1a\u6536\u5c3e\u548c\u91cd\u542f\n\n### 14\\. \u9000\u51fa\u73af\u5883\u5e76\u5378\u8f7d\n\n1.  **\u9000\u51fa chroot \u73af\u5883\uff1a**\n    ```bash\n    exit\n    ```\n2.  **\u5378\u8f7d\u6240\u6709\u5df2\u6302\u8f7d\u5206\u533a\uff1a**\n    ```bash\n    umount -R /mnt\n    ```\n3.  **\u91cd\u542f\u7cfb\u7edf\uff1a**\n    ```bash\n    reboot\n    ```\n    **\u26a0 \u8bb0\u5f97\u62d4\u6389 USB \u542f\u52a8\u76d8\uff01**\n\n## \u9636\u6bb5\u4e94\uff1a\u9996\u6b21\u542f\u52a8\u540e\u7684\u914d\u7f6e\n\n\u7cfb\u7edf\u91cd\u542f\u540e\uff0c\u60a8\u5c06\u8fdb\u5165\u547d\u4ee4\u884c\u767b\u5f55\u754c\u9762\u3002\u4f7f\u7528\u7528\u6237\u540d `syaofox` \u767b\u5f55\u3002\n\n### 15\\. \u5b89\u88c5 Paru AUR \u52a9\u624b\n\n\u6211\u4eec\u4f7f\u7528 `syaofox` \u7528\u6237\u6765\u5b89\u88c5 `paru`\uff0c\u56e0\u4e3a AUR \u52a9\u624b\u4e0d\u5e94\u8be5\u7528 `root` \u6743\u9650\u8fd0\u884c\u3002\n\n1.  **\u5207\u6362\u5230\u7528\u6237\u5bb6\u76ee\u5f55**\uff1a\n    ```bash\n    cd ~\n    ```\n2.  **\u514b\u9686 `paru` \u4ed3\u5e93**\uff1a\n    ```bash\n    git clone https://aur.archlinux.org/paru.git\n    cd paru\n    ```\n3.  **\u7f16\u8bd1\u5e76\u5b89\u88c5 `paru`**\uff1a(\u56e0\u4e3a `base-devel` \u5df2\u5b89\u88c5\uff0c\u6240\u4ee5\u53ef\u4ee5\u76f4\u63a5\u4f7f\u7528 `makepkg`)\n    ```bash\n    makepkg -si\n    ```\n4.  **\u6e05\u7406**\uff1a\n    ```bash\n    cd ..\n    rm -rf paru\n    ```\n\n### 16\\. \u4f7f\u7528 Paru \u5b89\u88c5 Brave \u6d4f\u89c8\u5668\n\n```bash\nparu -S brave-bin\n```\n\n### 17\\. Fcitx5 \u73af\u5883\u53d8\u91cf\u914d\u7f6e (\u547d\u4ee4\u884c\u73af\u5883\u63d0\u793a)\n\nFcitx5 \u9700\u8981\u56fe\u5f62\u73af\u5883\u624d\u80fd\u5de5\u4f5c\u3002\u5982\u679c\u60a8\u672a\u6765\u6253\u7b97\u5b89\u88c5\u4e00\u4e2a\u7a97\u53e3\u7ba1\u7406\u5668\uff08\u5982 i3/Sway\uff09\uff0c\u60a8\u9700\u8981\u5728 `syaofox` \u7528\u6237\u7684\u914d\u7f6e\u6587\u4ef6\u4e2d\u8bbe\u7f6e\u73af\u5883\u53d8\u91cf\u3002\n\n**\u7f16\u8f91 `~/.bashrc` \u6216 `~/.profile`\uff1a**\n\n```bash\nnano ~/.bashrc\n# \u5728\u6587\u4ef6\u672b\u5c3e\u6dfb\u52a0\u4ee5\u4e0b\u5185\u5bb9\uff1a\nexport GTK_IM_MODULE=fcitx\nexport QT_IM_MODULE=fcitx\nexport XMODIFIERS=@im=fcitx\nexport SDL_IM_MODULE=fcitx\n```\n\n\u4fdd\u5b58\u540e\uff0c\u8fd0\u884c `source ~/.bashrc` \u4f7f\u5176\u7acb\u5373\u751f\u6548\u3002\n\n\u81f3\u6b64\uff0c\u60a8\u7684 Arch Linux \u5f00\u53d1\u8005\u5b9a\u5236\u73af\u5883\u5df2\u5b89\u88c5\u5b8c\u6210\u3002"
            </script>

    <!-- TOC 容器（由 JS 动态生成） -->
    <aside class="toc-sidebar" id="toc-container">
        <h3 class="toc-title">
            目录
            <span class="toc-toggle">▼</span>
        </h3>
        <ul class="toc-list" id="toc-list"></ul>
    </aside>
</div>

    
    
    <!-- 滚动悬浮按钮 -->
    <div class="scroll-buttons">
        <button class="scroll-btn" id="scroll-to-top" title="回到顶部">↑</button>
        <button class="scroll-btn" id="scroll-to-bottom" title="滚到底部">↓</button>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 页面加载完成后，延迟移除 page-loading 类，启用过渡动画
            setTimeout(function() {
                document.documentElement.classList.remove('page-loading');
            }, 50);
            
            // 为所有代码块添加复制按钮
            const codeBlocks = document.querySelectorAll('pre > code');
            
            codeBlocks.forEach(function(codeBlock) {
                // 跳过已经包装的代码块
                if (codeBlock.parentElement.classList.contains('code-block-wrapper')) {
                    return;
                }
                
                const pre = codeBlock.parentElement;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                
                // 创建复制按钮
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '复制';
                
                // 包装pre元素
                pre.parentElement.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);
                wrapper.appendChild(copyBtn);
                
                // 添加复制功能
                copyBtn.addEventListener('click', function() {
                    const text = codeBlock.textContent;
                    
                    // 使用现代Clipboard API
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(text).then(function() {
                            showCopied(copyBtn);
                        }).catch(function() {
                            // 降级到传统方法
                            fallbackCopy(text, copyBtn);
                        });
                    } else {
                        // 降级到传统方法
                        fallbackCopy(text, copyBtn);
                    }
                });
            });
            
            function showCopied(btn) {
                btn.textContent = '已复制';
                btn.classList.add('copied');
                
                setTimeout(function() {
                    btn.textContent = '复制';
                    btn.classList.remove('copied');
                }, 1500);
            }
            
            function fallbackCopy(text, btn) {
                // 创建临时文本区域
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                textArea.style.top = '-999999px';
                document.body.appendChild(textArea);
                
                try {
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    showCopied(btn);
                } catch (err) {
                    console.error('复制失败:', err);
                    btn.textContent = '复制失败';
                    setTimeout(function() {
                        btn.textContent = '复制';
                    }, 1500);
                } finally {
                    document.body.removeChild(textArea);
                }
            }
            
            // 滚动悬浮按钮功能
            const scrollToTopBtn = document.getElementById('scroll-to-top');
            const scrollToBottomBtn = document.getElementById('scroll-to-bottom');
            
            function updateScrollButtons() {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                const windowHeight = window.innerHeight;
                const documentHeight = document.documentElement.scrollHeight;
                
                // 显示/隐藏回到顶部按钮
                if (scrollTop > 300) {
                    scrollToTopBtn.classList.add('visible');
                } else {
                    scrollToTopBtn.classList.remove('visible');
                }
                
                // 显示/隐藏滚到底部按钮
                if (scrollTop + windowHeight < documentHeight - 300) {
                    scrollToBottomBtn.classList.add('visible');
                } else {
                    scrollToBottomBtn.classList.remove('visible');
                }
            }
            
            // 监听滚动事件
            window.addEventListener('scroll', updateScrollButtons);
            
            // 回到顶部按钮点击事件
            scrollToTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
            
            // 滚到底部按钮点击事件
            scrollToBottomBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: document.documentElement.scrollHeight,
                    behavior: 'smooth'
                });
            });
            
            // 初始化时检查按钮状态
            updateScrollButtons();
            
            // 主题切换功能
            const themeToggle = document.getElementById('theme-toggle');
            const body = document.body;
            
            // 更新词云图片
            function updateWordcloudImage(isDark) {
                const wordcloudImg = document.getElementById('wordcloud-img');
                if (wordcloudImg) {
                    const newSrc = isDark ? 'assets/wordcloud-dark.png' : 'assets/wordcloud-light.png';
                    if (wordcloudImg.src !== new URL(newSrc, window.location.href).href) {
                        wordcloudImg.src = newSrc;
                        console.log('词云图片已切换至:', newSrc);
                    }
                } else {
                    console.warn('未找到词云图片元素');
                }
            }
            
            // 初始化主题（同步 body 类和其他主题相关元素）
            function initTheme() {
                const isDark = document.documentElement.classList.contains('dark-mode');
                
                // 同步 body 的 dark-mode 类
                if (isDark) {
                    body.classList.add('dark-mode');
                } else {
                    body.classList.remove('dark-mode');
                }
                
                // 初始化代码高亮主题
                const lightTheme = document.getElementById('highlight-theme-light');
                const darkTheme = document.getElementById('highlight-theme-dark');
                if (isDark) {
                    if (lightTheme) lightTheme.disabled = true;
                    if (darkTheme) darkTheme.disabled = false;
                } else {
                    if (lightTheme) lightTheme.disabled = false;
                    if (darkTheme) darkTheme.disabled = true;
                }
                
                updateWordcloudImage(isDark);
            }
            
            // 切换主题
            function toggleTheme() {
                const isDarkMode = document.documentElement.classList.contains('dark-mode');
                const lightTheme = document.getElementById('highlight-theme-light');
                const darkTheme = document.getElementById('highlight-theme-dark');
                
                if (isDarkMode) {
                    // 切换到亮色模式
                    document.documentElement.classList.remove('dark-mode');
                    body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                    updateWordcloudImage(false);
                    // 切换代码高亮主题
                    if (lightTheme) lightTheme.disabled = false;
                    if (darkTheme) darkTheme.disabled = true;
                } else {
                    // 切换到暗色模式
                    document.documentElement.classList.add('dark-mode');
                    body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                    updateWordcloudImage(true);
                    // 切换代码高亮主题
                    if (lightTheme) lightTheme.disabled = true;
                    if (darkTheme) darkTheme.disabled = false;
                }
            }
            
            // 监听主题切换按钮点击
            themeToggle.addEventListener('click', toggleTheme);
            
            // 立即初始化主题，避免闪烁
            initTheme();
            
            // 目录导航功能
            function initTocNavigation() {
                const tocItems = document.querySelectorAll('.toc-item a');
                if (tocItems.length === 0) return;
                
                // 移动端目录折叠功能
                function initMobileTocToggle() {
                    const tocSidebar = document.querySelector('.toc-sidebar');
                    const tocTitle = document.querySelector('.toc-title');
                    
                    if (!tocSidebar || !tocTitle) return;
                    
                    // 检查是否为移动端
                    function isMobile() {
                        return window.innerWidth <= 1023;
                    }
                    
                    // 初始化移动端状态
                    function initMobileState() {
                        if (isMobile()) {
                            tocSidebar.classList.remove('expanded');
                        } else {
                            tocSidebar.classList.add('expanded');
                        }
                    }
                    
                    // 切换折叠状态
                    function toggleToc() {
                        if (!isMobile()) return;
                        
                        tocSidebar.classList.toggle('expanded');
                    }
                    
                    // 监听标题点击
                    tocTitle.addEventListener('click', function(e) {
                        if (isMobile()) {
                            e.preventDefault();
                            toggleToc();
                        }
                    });
                    
                    // 监听窗口大小变化
                    window.addEventListener('resize', function() {
                        initMobileState();
                    });
                    
                    // 初始化状态
                    initMobileState();
                }
                
                // 初始化移动端折叠功能
                initMobileTocToggle();
                
                // 为目录链接添加平滑滚动
                tocItems.forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('href').substring(1);
                        const targetElement = document.getElementById(targetId);
                        
                        if (targetElement) {
                            targetElement.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start'
                            });
                        }
                    });
                });
                
                // 监听滚动，高亮当前章节
                function updateActiveTocItem() {
                    const headings = document.querySelectorAll('h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]');
                    const scrollTop = window.pageYOffset;
                    const windowHeight = window.innerHeight;
                    
                    let currentHeading = null;
                    
                    headings.forEach(heading => {
                        const headingTop = heading.offsetTop - 100; // 偏移量，提前激活
                        
                        if (scrollTop >= headingTop) {
                            currentHeading = heading;
                        }
                    });
                    
                    // 更新目录项激活状态
                    tocItems.forEach(link => {
                        link.parentElement.classList.remove('active');
                    });
                    
                    if (currentHeading) {
                        const activeLink = document.querySelector(`.toc-item a[href="#${currentHeading.id}"]`);
                        if (activeLink) {
                            activeLink.parentElement.classList.add('active');
                        }
                    }
                }
                
                // 节流滚动监听
                let ticking = false;
                window.addEventListener('scroll', function() {
                    if (!ticking) {
                        requestAnimationFrame(function() {
                            updateActiveTocItem();
                            ticking = false;
                        });
                        ticking = true;
                    }
                });
                
                // 初始调用
                updateActiveTocItem();
            }
            
            // 初始化目录导航
            initTocNavigation();
        });
    </script>
    
    
<script src="../../static/js/markdown-renderer.js"></script>
